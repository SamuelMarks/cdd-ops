# Docker Compose Configuration
#
# This file provides a basic definition for running the CDD platform
# microservices (gateway, web-ui, control-plane, engine, and storage)
# in a containerized environment.

version: "3.8"

services:
  gateway:
    image: nginx:alpine
    ports:
      - "80:80"
  web-ui:
    image: cdd-web-ui:latest
  control-plane:
    image: cdd-control-plane:latest
  engine:
    image: cdd-engine:latest
  storage:
    image: minio/minio
    command: server /data
